# ─────────────────────────────────────────────────────────────
#  LightShow Studio — nginx config (Next.js static export)
# ─────────────────────────────────────────────────────────────
#  After git pull on the VPS:
#    npm install && npm run build
#  The static site is in /var/www/lightshowstudio-website/out
#
#  Then:
#    sudo cp doc/nginx.conf /etc/nginx/sites-available/lightshowstudio
#    sudo ln -sf /etc/nginx/sites-available/lightshowstudio /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

# ── Accept-Language → locale mapping (for / redirect) ────────
# Picks the first supported language from the browser's Accept-Language
# header. Falls back to fr (default). Runs at http{} scope — the
# sites-available file is included inside http{}, so this is valid here.
map $http_accept_language $preferred_lang {
    default   fr;
    ~*^en     en;
    ~*^de     de;
    ~*^es     es;
    ~*^fr     fr;
}

# ── Redirect HTTP → HTTPS ────────────────────────────────────
server {
    listen 80;
    server_name lightshowstud.io www.lightshowstud.io;
    return 301 https://lightshowstud.io$request_uri;
}

# ── Redirect www → non-www (HTTPS) ──────────────────────────
server {
    listen 443 ssl http2;
    server_name www.lightshowstud.io;

    ssl_certificate     /etc/letsencrypt/live/lightshowstud.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lightshowstud.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://lightshowstud.io$request_uri;
}

# ── Main server block ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name lightshowstud.io;

    # --- SSL (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/lightshowstud.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lightshowstud.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Document root (Next.js static export) ---
    root /var/www/lightshowstudio-website/out;
    index index.html;

    # --- Root: 302 redirect to the user's preferred language ---
    # Exact match (=) so only / is affected. /fr, /en/blog/..., /_next/...
    # are untouched and fall through to the generic `location /` below.
    # 302 (not 301) so crawlers don't cache the choice and so the
    # preference can change with Accept-Language.
    # Vary tells caches/CDNs the response depends on Accept-Language.
    location = / {
        add_header Vary "Accept-Language" always;
        return 302 /$preferred_lang;
    }

    # --- Routing ---
    # Next.js static export generates:
    #   /fr        → fr.html
    #   /fr/blog   → fr/blog.html
    #   /fr/blog/x → fr/blog/x.html
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # --- Cache: Next.js hashed assets (immutable) ---
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Cache: public static files (images, fonts, glb…) ---
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot|glb|mp4)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # --- Security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Misc ---
    client_max_body_size 5M;

    # --- Custom error pages (optional) ---
    error_page 404 /404.html;

    # --- Logs ---
    error_log  /var/log/nginx/lightshowstudio_error.log;
    access_log /var/log/nginx/lightshowstudio_access.log;
}
